<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner CIE per Ross1000</title>
    <!-- Carica il motore OCR sicuro di Tesseract dal web. Sul telefono servirà internet solo al primo avvio della pagina -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background-color: #f4f4f9; color: #333; }
        h2 { text-align: center; color: #0275d8; }
        .btn-container { display: flex; gap: 10px; margin-bottom: 15px; }
        button { flex: 1; padding: 12px; font-size: 15px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; }
        #btnFronte { background-color: #0275d8; }
        #btnRetro { background-color: #f0ad4e; }
        #btnSalva { background-color: #5cb85c; width: 100%; margin-top: 15px; font-size: 16px; }
        .camera-box { position: relative; width: 100%; max-width: 400px; margin: 0 auto 15px auto; display: none; }
        video { width: 100%; border-radius: 8px; transform: scaleX(1); }
        .mirino { position: absolute; top: 15%; left: 5%; width: 90%; height: 70%; border: 3px dashed red; border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); pointer-events: none; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 2px; color: #555; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        #status { text-align: center; font-weight: bold; color: #d9534f; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Scanner CIE (Locale & GDPR)</h2>
    <div id="status">Pronto per la scansione</div>

    <div class="btn-container">
        <button id="btnFronte" onclick="avviaScansione('FRONTE')">📸 Fronte</button>
        <button id="btnRetro" onclick="avviaScansione('RETRO')">📸 Retro (MRZ)</button>
    </div>

    <!-- Contenitore della fotocamera attiva -->
    <div class="camera-box" id="cameraBox">
        <video id="video" autoplay playsinline></video>
        <div class="mirino"></div>
    </div>

    <!-- Campi del modulo compilati automaticamente -->
    <div id="modulo">
        <div class="form-group"><label>Cognome</label><input type="text" id="cognome"></div>
        <div class="form-group"><label>Nome</label><input type="text" id="nome"></div>
        <div class="form-group"><label>Sesso (M/F)</label><input type="text" id="sesso"></div>
        <div class="form-group"><label>Data di Nascita</label><input type="text" id="dataNascita"></div>
        <div class="form-group"><label>Cittadinanza</label><input type="text" id="cittadinanza"></div>
        <div class="form-group"><label>Numero Documento</label><input type="text" id="numDoc"></div>
        <div class="form-group"><label>Comune/Stato Residenza</label><input type="text" id="residenza"></div>
    </div>

    <button id="btnSalva" onclick="scaricaCSV()">💾 Scarica riga per Excel</button>

    <!-- Canvas nascosto usato solo per estrarre la foto in memoria RAM e fare l'OCR, poi distrutto -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        let modalitaAttiva = "";
        let intervalloScansione;
        const video = document.getElementById('video');
        const cameraBox = document.getElementById('cameraBox');
        const statusDiv = document.getElementById('status');

        async function avviaScansione(tipo) {
            modalitaAttiva = tipo;
            cameraBox.style.display = "block";
            statusDiv.innerText = "Avvio fotocamera in corso...";
            
            if (intervalloScansione) clearInterval(intervalloScansione);

            try {
                // Attiva la fotocamera posteriore dello smartphone
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                statusDiv.innerText = `Inquadra il ${tipo} nel rettangolo`;

                // Avvia l'analisi del testo ogni 2.5 secondi per non rallentare il telefono
                intervalloScansione = setInterval(catturaEAnalizza, 2500);
            } catch (err) {
                statusDiv.innerText = "Errore di accesso alla fotocamera.";
                console.error(err);
            }
        }

        function catturaEAnalizza() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Disegna il fotogramma corrente sul canvas invisibile (rimane solo in memoria RAM)
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            statusDiv.innerText = "Analisi testo in corso (Locale)...";

            // Avvia il motore OCR Tesseract sulla foto temporanea
            Tesseract.recognize(canvas, 'ita+eng')
                .then(({ data: { text } }) => {
                    elaboraTestoEstratto(text);
                })
                .catch(err => console.error(err));
        }

        function elaboraTestoEstratto(testoGrezzo) {
            const linee = testoGrezzo.split('\n').map(l => l.trim().replace(/\s+/g, ' '));
            
            if (modalitaAttiva === "FRONTE") {
                // Cerca Numero Documento (Formato CIE: 2 lettere, 5 numeri, 2 lettere)
                const matchDoc = testoGrezzo.toUpperCase().match(/[A-Z]{2}\d{5}[A-Z]{2}/);
                if (matchDoc) document.getElementById('numDoc').value = matchDoc[0];

                // Cerca Cognome e Nome analizzando le righe successive alle etichette
                for (let i = 0; i < linee.length; i++) {
                    const linea = linee[i].toUpperCase();
                    if ((linea.includes("COGNOME") || linea.includes("SURNAME")) && i + 1 < linee.length) {
                        if (!linee[i+1].includes("NOME")) document.getElementById('cognome').value = linee[i+1];
                    }
                    if ((linea.includes("NOME") || linea.includes("GIVEN")) && i + 1 < linee.length) {
                        document.getElementById('nome').value = linee[i+1];
                    }
                    if (linea.match(/\b([MF])\b/)) {
                        const sessoMatch = linea.match(/\b([MF])\b/);
                        document.getElementById('sesso').value = sessoMatch[1];
                    }
                }
                
                // Se ha preso i dati fondamentali del fronte, ferma la fotocamera
                if (document.getElementById('cognome').value && document.getElementById('numDoc').value) {
                    fermaFotocamera("Dati Fronte acquisiti!");
                }

            } else if (modalitaAttiva === "RETRO") {
                // Cerca la zona standard delle freccette MRZ <<<<<<
                const righeMrz = linee.filter(l => l.includes("<<") || l.replace(/[^<]/g, "").length > 5);
                
                if (righeMrz.length >= 2) {
                    // Elaborazione semplificata basata sulla struttura fissa della MRZ sul retro
                    statusDiv.innerText = "MRZ Rilevata!";
                    
                    // Cerchiamo la riga che contiene la data di nascita (solitamente inizia con numeri)
                    const rigaDati = righeMrz.find(r => r.match(/^\d/));
                    if (rigaDati && rigaDati.length >= 10) {
                        const dataGrezza = rigaDati.substring(0, 6); // AAMMGG
                        const sesso = rigaDati.substring(7, 8);
                        const cittadinanza = rigaDati.substring(10, 13);
                        
                        document.getElementById('dataNascita').value = `${dataGrezza.substring(4,6)}/${dataGrezza.substring(2,4)}/19${dataGrezza.substring(0,2)}`;
                        if (sesso === "M" || sesso === "F") document.getElementById('sesso').value = sesso;
                        document.getElementById('cittadinanza').value = cittadinanza;
                    }
                }

                // Cerca la residenza nel testo normale del retro
                for (let i = 0; i < linee.length; i++) {
                    if (linee[i].toUpperCase().includes("RESIDENZA") && i + 1 < linee.length) {
                        document.getElementById('residenza').value = linee[i+1];
                    }
                }

                if (document.getElementById('dataNascita').value) {
                    fermaFotocamera("Dati Retro acquisiti!");
                }
            }
        }

        function fermaFotocamera(messaggio) {
            clearInterval(intervalloScansione);
            const stream = video.srcObject;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            video.srcObject = null;
            cameraBox.style.display = "none";
            statusDiv.innerText = messaggio;
        }

        function scaricaCSV() {
            const cog = document.getElementById('cognome').value;
            const nom = document.getElementById('nome').value;
            const sex = document.getElementById('sesso').value;
            const dat = document.getElementById('dataNascita').value;
            const cit = document.getElementById('cittadinanza').value;
            const doc = document.getElementById('numDoc').value;
            const res = document.getElementById('residenza').value;

            // Formattazione riga punto e virgola per Excel / Ross1000
            const rigaCSV = `${cog};${nom};${sex};${dat};${cit};CIE;${doc};${res}\n`;
            
            const blob = new Blob([rigaCSV], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `ospite_${cog || 'nuovo'}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
